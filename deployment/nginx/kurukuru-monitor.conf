server {
    listen 80;
    server_name _;
    # Replace "_" with the real host name or LAN DNS name if available.

    root /opt/kurukuru-monitor/frontend;
    index index.html;

    access_log /var/log/nginx/kurukuru-monitor.access.log;
    error_log /var/log/nginx/kurukuru-monitor.error.log;

    # Browser frontend.
    # Hash routes such as /#/operator/map are handled client-side,
    # so nginx only needs to serve index.html for normal frontend paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fastify API proxy.
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GPS endpoints.
    location /gps/ {
        proxy_pass http://127.0.0.1:4000/gps/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional health endpoint passthrough.
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade proxy.
    location /ws/ {
        proxy_pass http://127.0.0.1:4000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
